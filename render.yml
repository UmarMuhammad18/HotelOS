services:
  - type: web
    name: hotelos-frontend
    runtime: node
    repo: https://github.com/UmarMuhammad18/HotelOS # Replace with your repo URL
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run serve
    envVars:
      # Frontend auto-detects environment and connects to backend
      # Optional: explicitly set backend URL if auto-detection fails
      # - key: REACT_APP_API_URL
      #   value: https://hotelos-api-xxxxx.onrender.com

  - type: web
    name: hotelos-api
    runtime: node
    repo: https://github.com/UmarMuhammad18/HotelOS # Replace with your repo URL
    plan: free
    buildCommand: cd hotelos-api && npm install
    startCommand: cd hotelos-api && npm start
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_FILE
        value: /data/hotelos.db
      - key: JWT_SECRET
        generateValue: true # Generate a random secret
      - key: STRIPE_SECRET_KEY
        sync: false # You'll set this manually in the Render dashboard
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
